<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Gleam</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forgot.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header class="auth-header">
        <div class="container">
            <a href="index.html">
                <img src="assets/images/app_logo.png" alt="Gleam Logo" class="auth-logo">
            </a>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            
            <div id="request-section">
                <div class="auth-titles">
                    <img src="assets/images/forget.png" alt="Forgot Password" class="forgot-image">
                    <h1>Forgot Password?</h1>
                    <p>No worries! Enter your registered email address and we will send you a reset link.</p>
                </div>

                <form class="auth-form" id="forgotForm">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <button type="submit" class="btn-submit">Send Reset Link</button>
                </form>
            </div>

            <div id="success-section" class="hidden">
                <div class="success-content">
                    <div class="success-icon-wrapper">
                        <span class="material-symbols-outlined">mark_email_read</span>
                    </div>
                    <h2>Check your email</h2>
                    <p>We've sent a password reset link to <br> <strong id="user-email-display">your email</strong></p>
                    <p class="small-text">Didn't receive the email? Check your spam folder.</p>
                </div>
            </div>

            <div class="auth-footer">
                <a href="login.html" class="back-link">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Back to Log In
                </a>
            </div>

        </div>
    </main>
<script type="module" src="js/forgot.js"></script>
</body>
</html>
