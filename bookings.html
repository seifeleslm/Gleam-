<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gleam | My Bookings</title>
    <meta name="description" content="View and manage all your Gleam bookings.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bookings.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <button class="back-btn" id="backBtn" aria-label="Go back">
                    <span class="material-symbols-outlined">arrow_back_ios_new</span>
                </button>
                <img src="assets/images/app_logo.png" alt="Gleam" class="logo-large">
            </div>
            <h2 class="header-title">My Bookings</h2>
            <div class="action-btn" id="notifBtn">
                <span class="material-symbols-outlined">notifications</span>
                <span class="badge hidden" id="notifCount">0</span>
            </div>
        </div>
    </header>

    <!-- ===== STATUS FILTER TABS ===== -->
    <div class="status-tabs" id="statusTabs">
        <button class="tab-btn active" data-filter="all" id="tabAll">All</button>
        <button class="tab-btn" data-filter="confirmed" id="tabConfirmed">Confirmed</button>
        <button class="tab-btn" data-filter="completed" id="tabCompleted">Completed</button>
        <button class="tab-btn" data-filter="pending" id="tabPending">Pending</button>
        <button class="tab-btn" data-filter="cancelled" id="tabCancelled">Cancelled</button>
    </div>

    <!-- ===== BOOKINGS LIST ===== -->
    <main class="bookings-main">
        <!-- Loading state -->
        <div class="loading-state" id="loadingState">
            <span class="material-symbols-outlined spin">autorenew</span>
            <p>Loading your bookings...</p>
        </div>

        <!-- Bookings list -->
        <div class="bookings-list hidden" id="bookingsList"></div>

        <!-- Empty state -->
        <div class="empty-state hidden" id="emptyState">
            <span class="material-symbols-outlined">calendar_month</span>
            <h3 id="emptyTitle">No bookings yet</h3>
            <p id="emptyMsg">Your bookings will appear here once you book a session.</p>
            <a href="parent-home.html" class="btn-explore">Explore Providers</a>
        </div>
    </main>

    <!-- ===== RATING MODAL ===== -->
    <div class="modal-overlay hidden" id="ratingModal">
        <div class="rating-modal-card">
            <button class="modal-close-btn" id="closeRatingModal">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="modal-icon-wrap">
                <span class="material-symbols-outlined">star</span>
            </div>
            <h2 id="ratingModalTitle">Rate Provider</h2>
            <p id="ratingModalSub">How was your experience?</p>

            <div class="star-row" id="starRow">
                <span class="star-btn material-symbols-outlined" data-val="1">star</span>
                <span class="star-btn material-symbols-outlined" data-val="2">star</span>
                <span class="star-btn material-symbols-outlined" data-val="3">star</span>
                <span class="star-btn material-symbols-outlined" data-val="4">star</span>
                <span class="star-btn material-symbols-outlined" data-val="5">star</span>
            </div>

            <textarea id="ratingComment" rows="3"
                placeholder="Write a review (optional)..."></textarea>

            <input type="hidden" id="ratingProviderId">
            <input type="hidden" id="ratingBookingId">

            <div class="modal-actions">
                <button class="btn-cancel-modal" id="cancelRatingBtn">Cancel</button>
                <button class="btn-submit-rating" id="submitRatingBtn">Submit</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/bookings.js?v=1"></script>
</body>
</html>
