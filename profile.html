<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gleam | My Profile</title>
    <meta name="description" content="Manage your Gleam parent profile and child information.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <button class="back-btn" id="backBtn" aria-label="Go back">
                    <span class="material-symbols-outlined">arrow_back_ios_new</span>
                </button>
                <img src="assets/images/app_logo.png" alt="Gleam" class="logo-large">
            </div>
            <h2 class="header-title">My Profile</h2>
            <div class="action-btn" id="notifBtn">
                <span class="material-symbols-outlined">notifications</span>
                <span class="badge hidden" id="notifCount">0</span>
            </div>
        </div>
    </header>


    <!-- ===== MAIN FORM ===== -->
    <main class="profile-main" id="profileMain">

        <!-- PHOTO CARD — Dart "Family Card" with parent + child avatars -->
        <div class="photo-card" id="photoCard">
            <div class="photo-pair">

                <!-- Parent Photo -->
                <div class="avatar-group">
                    <div class="avatar-wrap" id="parentAvatarWrap">
                        <img id="parentAvatarImg" src="assets/images/app_logo.png" alt="Parent">
                        <button class="camera-btn" id="parentCameraBtn" aria-label="Change parent photo">
                            <span class="material-symbols-outlined">camera_alt</span>
                        </button>
                        <!-- Hidden file input -->
                        <input type="file" id="parentFileInput" accept="image/*" class="hidden-file-input">
                    </div>
                    <span class="avatar-label">Parent Photo</span>
                    <!-- Upload progress -->
                    <span class="upload-status hidden" id="parentUploadStatus">
                        <span class="material-symbols-outlined spin">autorenew</span> Uploading...
                    </span>
                </div>

                <!-- Swap icon -->
                <div class="swap-icon">
                    <span class="material-symbols-outlined">swap_horiz</span>
                </div>

                <!-- Child Photo -->
                <div class="avatar-group">
                    <div class="avatar-wrap child" id="childAvatarWrap">
                        <img id="childAvatarImg" src="assets/images/app_logo.png" alt="Child">
                        <button class="camera-btn child-cam" id="childCameraBtn" aria-label="Change child photo">
                            <span class="material-symbols-outlined">camera_alt</span>
                        </button>
                        <input type="file" id="childFileInput" accept="image/*" class="hidden-file-input">
                    </div>
                    <span class="avatar-label child-label">Child Photo</span>
                    <span class="upload-status hidden" id="childUploadStatus">
                        <span class="material-symbols-outlined spin">autorenew</span> Uploading...
                    </span>
                </div>

            </div>
        </div>

        <!-- PARENT INFORMATION SECTION -->
        <section class="form-section">
            <h3 class="form-section-title">
                <span class="material-symbols-outlined">person</span>
                Parent Information
            </h3>

            <div class="field-group">
                <label for="fullNameInput">Full Name</label>
                <div class="input-wrap">
                    <span class="material-symbols-outlined input-icon">person_outline</span>
                    <input type="text" id="fullNameInput" placeholder="Enter your full name">
                </div>
            </div>

            <div class="field-group">
                <label for="phoneInput">Phone Number</label>
                <div class="input-wrap">
                    <span class="material-symbols-outlined input-icon">phone</span>
                    <input type="tel" id="phoneInput" placeholder="Enter your phone number">
                </div>
            </div>
        </section>

        <div class="section-divider"></div>

        <!-- CHILD INFORMATION SECTION -->
        <section class="form-section">
            <h3 class="form-section-title">
                <span class="material-symbols-outlined">child_care</span>
                Child Information
            </h3>

            <div class="field-group">
                <label for="childNameInput">Child Name</label>
                <div class="input-wrap">
                    <span class="material-symbols-outlined input-icon">child_care</span>
                    <input type="text" id="childNameInput" placeholder="Enter child's name">
                </div>
            </div>

            <div class="field-group">
                <label for="childAgeInput">Child Age</label>
                <div class="input-wrap">
                    <span class="material-symbols-outlined input-icon">cake</span>
                    <input type="text" id="childAgeInput" placeholder="e.g. 5 Years">
                </div>
            </div>

            <div class="field-group">
                <label for="childNotesInput">Special Notes / Condition <span class="optional-tag">(Optional)</span></label>
                <textarea id="childNotesInput" rows="4"
                    placeholder="e.g. Autism, ADHD, hearing impairment... These notes help providers understand your child better."></textarea>
                <p class="field-hint">These notes help providers understand your child better.</p>
            </div>
        </section>

        <!-- SAVE BUTTON -->
        <div class="save-section">
            <button class="btn-save" id="saveBtn">
                <span class="material-symbols-outlined">save</span>
                Save Profile Changes
            </button>
        </div>

        <!-- Bottom spacing -->
        <div style="height: 40px;"></div>
    </main>

    <script type="module" src="js/profile.js?v=1"></script>
</body>
</html>
