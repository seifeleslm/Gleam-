<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Gleam</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header class="auth-header">
        <div class="container">
            <a href="index.html">
                <img src="assets/images/app_logo.png" alt="Gleam Logo" class="auth-logo">
            </a>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            
            <div class="auth-titles">
                <h1>Welcome back</h1>
                <p>Log in to manage your care and education.</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <span class="material-symbols-outlined toggle-pass" id="togglePass">visibility_off</span>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Log In</button>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <div class="social-auth-row">
                <button type="button" class="social-icon-btn">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                </button>
                <button type="button" class="social-icon-btn">
                    <img src="https://www.svgrepo.com/show/512008/apple-173.svg" alt="Apple">
                </button>
                <button type="button" class="social-icon-btn">
                    <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" alt="Facebook">
                </button>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>

        </div>
    </main>
<script type="module" src="js/login.js"></script>
</body>
</html>
